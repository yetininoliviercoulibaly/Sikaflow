# =============================================================================
# Cloudflare Tunnel — Production Configuration
# =============================================================================

tunnel: ${CLOUDFLARE_TUNNEL_ID}
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # API Backend (NestJS)
  - hostname: api.sika-flow.com
    service: http://backend:3000

  # ZeroClaw Agent (WhatsApp/Telegram webhooks)
  - hostname: agent.sika-flow.com
    service: http://zeroclaw:3001

  # Frontend Dashboard (Next.js)
  - hostname: app.sika-flow.com
    service: http://frontend:3000

  # Scanner PWA (Ticket Validation)
  - hostname: scanner.sika-flow.com
    service: http://scanner:80

  # Catch-all (must be last)
  - service: http_status:404

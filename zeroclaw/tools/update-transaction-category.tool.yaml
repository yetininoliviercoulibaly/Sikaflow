name: update_transaction_category
description: >
  Corrige la catégorie d'une transaction déjà enregistrée.
  À utiliser uniquement quand session.lastTransactionId est défini
  et que l'utilisateur veut changer la catégorie.

type: http_request

config:
  method: PATCH
  url: "{{SIKAFLOW_API_URL}}/transactions/{{transaction_id}}/category"
  headers:
    X-API-Key: "{{SIKAFLOW_API_KEY}}"
    Content-Type: application/json
  body:
    category: "{{category}}"

parameters:
  - name: transaction_id
    description: "UUID de la transaction à corriger (depuis session.lastTransactionId)"
    type: string
    required: true

  - name: category
    description: >
      Nouvelle catégorie normalisée. Valeurs pour dépenses :
      Boissons, Nourriture, Staff, Charges, Transport, Général.
      Valeurs pour revenus : Ventes, Services, Location, Général.
    type: string
    required: true

response_schema:
  type: object
  properties:
    id:
      type: string
    category:
      type: string
      description: "Catégorie mise à jour"
    amount:
      type: number
    type:
      type: string

post_actions:
  - memory_write:
      "session.lastTransactionCategory": "{{response.category}}"

on_error:
  - send_message: "Désolé, je n'ai pas pu mettre à jour la catégorie. Réessaie dans quelques instants."

examples:
  - description: "Correction Staff → Charges"
    request:
      transaction_id: "tx-uuid-abc"
      category: "Charges"
    response:
      id: "tx-uuid-abc"
      category: "Charges"
      amount: 15000
      type: "EXPENSE"

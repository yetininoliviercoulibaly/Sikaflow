name: remind_debt
description: >
  Envoie un rappel de paiement à un débiteur (si son numéro est enregistré).
  Si le débiteur n'a pas de numéro, retourne un texte prêt à envoyer manuellement.
  Utilise le shortId du débiteur (disponible via get_debts ou session.lastDebtContactShortId).

type: http_request

config:
  method: POST
  url: "http://backend:3000/debts/{{short_id}}/remind"
  headers:
    X-API-Key: "6893f5eb67ceb8c2d2f38dfc91d844a1359294530da91e100f44d84bcbb56dc4"
    Content-Type: application/json
  body:
    phoneNumber: "{{phone_number}}"

parameters:
  - name: phone_number
    description: "Numéro de téléphone de l'utilisateur au format E.164 (ex: +22507000000)"
    type: string
    required: true

  - name: short_id
    description: "Identifiant court du débiteur (6 caractères, ex: BC12AB). Disponible via get_debts ou session.lastDebtContactShortId"
    type: string
    required: true

response_schema:
  type: object
  properties:
    contact:
      type: object
      properties:
        shortId:
          type: string
        displayName:
          type: string
        totalOwed:
          type: number
        phone:
          type: string
          nullable: true
    messageSent:
      type: boolean
      description: "true si le message a été envoyé au débiteur, false si pas de numéro enregistré"
    reminderText:
      type: string
      description: "Texte du rappel envoyé (ou à envoyer manuellement si messageSent=false)"

on_error:
  - send_message: "Désolé, je n'ai pas pu envoyer le rappel. Réessaie dans quelques instants."

examples:
  - description: "Rappel envoyé à Kofi (numéro connu)"
    request:
      phone_number: "+22507000000"
      short_id: "BC12AB"
    response:
      contact:
        shortId: "BC12AB"
        displayName: "Kofi"
        totalOwed: 5000
        phone: "+22508000000"
      messageSent: true
      reminderText: "👋 Bonjour Kofi, ceci est un rappel concernant une dette de 5 000 FCFA. Merci de régulariser dès que possible ! 🙏"

  - description: "Pas de numéro — message à envoyer manuellement"
    request:
      phone_number: "+22507000000"
      short_id: "AX78CD"
    response:
      contact:
        shortId: "AX78CD"
        displayName: "Bakary"
        totalOwed: 25000
        phone: null
      messageSent: false
      reminderText: "👋 Bonjour Bakary, ceci est un rappel concernant une dette de 25 000 FCFA. Merci de régulariser dès que possible ! 🙏"

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # 1. DATABASE (PostgreSQL)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - sikaflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 2. CACHE (Redis)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 3. MIGRATION RUNNER (Job Init)
  # ---------------------------------------------------------------------------
  migration-runner:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-softilab}/sikaflow-backend:latest
    command: sh -c "npx mikro-orm migration:up --config ./dist/src/mikro-orm.config.js && npx mikro-orm seeder:run --config ./dist/src/mikro-orm.config.js"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      MIKRO_ORM_MIGRATIONS_DISABLE_FOREIGN_KEYS: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 4. API (NestJS)
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-softilab}/sikaflow-backend:latest
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # Keys
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_SIGNATURE: "true"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      WAVE_API_KEY: ${WAVE_API_KEY}
      WAVE_MONTHLY_AMOUNT: ${WAVE_MONTHLY_AMOUNT:-5000}
      PAYMENT_REGION: ${PAYMENT_REGION:-INTERNATIONAL}
      MONTHLY_PRICE_ID: ${MONTHLY_PRICE_ID:-price_default}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-1.5-flash}
      AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD:-0.85}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      # Feature Flags
      BYPASS_SUBSCRIPTION_CHECK: ${BYPASS_SUBSCRIPTION_CHECK:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migration-runner:
        condition: service_completed_successfully
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 5. FRONTEND (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-softilab}/sikaflow-frontend:latest
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${APP_URL}
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 6. CLOUDFLARE TUNNEL (Expose to Internet)
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflare/config.prod.yml:/etc/cloudflared/config.yml:ro
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      zeroclaw:
        condition: service_started
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 7. ZEROCLAW DB INIT (One-shot: create zeroclaw database if not exists)
  # ---------------------------------------------------------------------------
  zeroclaw-db-init:
    image: postgres:15-alpine
    entrypoint: ["sh", "-c"]
    command:
      - |
        until pg_isready -h db -U ${DB_USER}; do sleep 1; done
        psql -h db -U ${DB_USER} -d ${DB_NAME} -tc "SELECT 1 FROM pg_database WHERE datname = 'zeroclaw_prod'" | grep -q 1 || psql -h db -U ${DB_USER} -d ${DB_NAME} -c "CREATE DATABASE zeroclaw_prod"
        echo "✅ ZeroClaw database ready"
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 8. ZEROCLAW AGENT (AI Orchestrator)
  # ---------------------------------------------------------------------------
  zeroclaw:
    build:
      context: ./zeroclaw-engine
      dockerfile: Dockerfile
    image: sikaflow/zeroclaw:custom
    command: ["daemon"]
    restart: always
    volumes:
      - ./zeroclaw/config.toml:/zeroclaw-data/.zeroclaw/config.toml:ro
      # ZeroClaw expects identity context in IDENTITY.md or AGENTS.md inside the workspace
      - ./zeroclaw/system-prompt.md:/zeroclaw-data/workspace/IDENTITY.md:ro
      # Mount other context files into the workspace so the LLM can use file_read to read them
      - ./zeroclaw/memory-schema.md:/zeroclaw-data/workspace/MEMORY_SCHEMA.md:ro
      - ./zeroclaw/onboarding-conversation.md:/zeroclaw-data/workspace/ONBOARDING.md:ro
    environment:
      ZEROCLAW_SYSTEM_PROMPT: /zeroclaw-data/workspace/IDENTITY.md
      ZEROCLAW_MEMORY_BACKEND: postgres
      ZEROCLAW_DB_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/zeroclaw_prod
      ZEROCLAW_GATEWAY_PORT: "3001"
      ZEROCLAW_GATEWAY_HOST: "0.0.0.0"
      ZEROCLAW_PROVIDER: google
      ZEROCLAW_MODEL: ${GEMINI_MODEL_NAME:-gemini-2.0-flash}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      # Template variables for tool YAML files
      SIKAFLOW_API_URL: http://backend:3000
      SIKAFLOW_API_KEY: ${ADMIN_API_KEY}
      # WhatsApp channel
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_VERIFY_SIGNATURE: "true"
      # Telegram channel
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      ZEROCLAW_WORKSPACE: /zeroclaw-data/workspace
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      zeroclaw-db-init:
        condition: service_completed_successfully
    networks:
      - sikaflow_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  sikaflow_net:
    driver: bridge

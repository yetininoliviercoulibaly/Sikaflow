version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # APPLICATION (NestJS)
  # ---------------------------------------------------------------------------
  app:
    container_name: eventpilot_app
    build:
      context: ../
      dockerfile: Dockerfile
    restart: always
    env_file: .env.prod
    environment:
      # Connect to Supabase & Upstash via env vars in .env.prod
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - eventpilot_net

  # ---------------------------------------------------------------------------
  # SECURE TUNNEL (Cloudflare)
  # ---------------------------------------------------------------------------
  cloudflared:
    container_name: eventpilot_tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - eventpilot_net

networks:
  eventpilot_net:
    driver: bridge

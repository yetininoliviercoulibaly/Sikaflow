version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # 1. APPLICATION (NestJS)
  # ---------------------------------------------------------------------------
  app:
    container_name: eventpilot_app
    build:
      context: ../
      dockerfile: Dockerfile
    restart: always
    env_file: .env.prod
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - REDIS_HOST=redis
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - eventpilot_net

  # ---------------------------------------------------------------------------
  # 2. DATABASE (PostgreSQL)
  # ---------------------------------------------------------------------------
  db:
    container_name: eventpilot_db
    image: postgres:15-alpine
    restart: always
    env_file: .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eventpilot_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 3. CACHE & QUEUE (Redis)
  # ---------------------------------------------------------------------------
  redis:
    container_name: eventpilot_redis
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - eventpilot_net

  # ---------------------------------------------------------------------------
  # 4. SECURE TUNNEL (Cloudflare)
  # ---------------------------------------------------------------------------
  cloudflared:
    container_name: eventpilot_tunnel
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - eventpilot_net

volumes:
  postgres_data:
  redis_data:

networks:
  eventpilot_net:
    driver: bridge

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # 1. DATABASE (PostgreSQL)
  # ---------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    networks:
      - sikaflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 2. CACHE (Redis)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data_staging:/data
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 3. MIGRATION RUNNER (Job Init)
  # ---------------------------------------------------------------------------
  migration-runner:
    # HARDCODED IMAGE to avoid variable expansion issues
    image: ghcr.io/softilab/sikaflow-backend:${BACKEND_IMAGE_TAG:-develop}
    command: sh -c "ls -l ./dist/src/mikro-orm.config.js && node -e \"require('./dist/src/mikro-orm.config.js')\" && ./node_modules/.bin/mikro-orm migration:up && ./node_modules/.bin/mikro-orm seeder:run"
    environment:
      NODE_ENV: staging
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      MIKRO_ORM_MIGRATIONS_DISABLE_FOREIGN_KEYS: "false"
      MIKRO_ORM_ALLOW_TS: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 4. API (NestJS)
  # ---------------------------------------------------------------------------
  backend:
    # HARDCODED IMAGE to avoid variable expansion issues
    image: ghcr.io/softilab/sikaflow-backend:${BACKEND_IMAGE_TAG:-develop}
    restart: always
    environment:
      NODE_ENV: staging
      PORT: 3000
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      SCANNER_URL: ${SCANNER_URL}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET}
      # Keys
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_SIGNATURE: ${WHATSAPP_VERIFY_SIGNATURE:-true}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      WAVE_API_KEY: ${WAVE_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-1.5-flash}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      # Feature Flags
      BYPASS_SUBSCRIPTION_CHECK: ${BYPASS_SUBSCRIPTION_CHECK:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migration-runner:
        condition: service_completed_successfully
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 5. FRONTEND (Next.js) - Dashboard
  # ---------------------------------------------------------------------------
  frontend:
    # HARDCODED IMAGE
    image: ghcr.io/softilab/sikaflow-frontend:develop
    restart: always
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_API_URL: https://api-staging.sika-flow.com
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 6. SCANNER (Vite React PWA) - Ticket Validation
  # ---------------------------------------------------------------------------
  scanner:
    # HARDCODED IMAGE
    image: ghcr.io/softilab/sikaflow-scanner:develop
    restart: always
    environment:
      VITE_API_URL: https://api-staging.sika-flow.com
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 7. CLOUDFLARE TUNNEL (Expose to Internet)
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflare/config.staging.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflare/credentials.json:/etc/cloudflared/credentials.json:ro
    environment:
      - CLOUDFLARE_TUNNEL_ID=${CLOUDFLARE_TUNNEL_ID}
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      zeroclaw:
        condition: service_started
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 8. ZEROCLAW DB INIT (One-shot: create zeroclaw database if not exists)
  # ---------------------------------------------------------------------------
  zeroclaw-db-init:
    image: pgvector/pgvector:pg15
    entrypoint: ["sh", "-c"]
    command:
      - |
        until pg_isready -h db -U ${DB_USER}; do sleep 1; done
        psql -h db -U ${DB_USER} -d ${DB_NAME} -tc "SELECT 1 FROM pg_database WHERE datname = 'zeroclaw_poc'" | grep -q 1 || psql -h db -U ${DB_USER} -d ${DB_NAME} -c "CREATE DATABASE zeroclaw_poc"
        echo "✅ ZeroClaw database ready"
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 9. ZEROCLAW AGENT (AI Orchestrator)
  # ---------------------------------------------------------------------------
  zeroclaw:
    image: zeroclaw/zeroclaw:latest
    restart: always
    volumes:
      - ./zeroclaw/system-prompt.md:/app/system-prompt.md:ro
      - ./zeroclaw/memory-schema.md:/app/memory-schema.md:ro
      - ./zeroclaw/onboarding-conversation.md:/app/onboarding-conversation.md:ro
      - ./zeroclaw/tools:/app/tools:ro
    environment:
      ZEROCLAW_SYSTEM_PROMPT: /app/system-prompt.md
      ZEROCLAW_TOOLS_DIR: /app/tools
      ZEROCLAW_MEMORY_BACKEND: postgres
      ZEROCLAW_DB_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/zeroclaw_poc
      ZEROCLAW_GATEWAY_PORT: "3001"
      ZEROCLAW_GATEWAY_HOST: "0.0.0.0"
      ZEROCLAW_PROVIDER: google
      ZEROCLAW_MODEL: ${GEMINI_MODEL_NAME:-gemini-2.0-flash}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      # Template variables for tool YAML files
      SIKAFLOW_API_URL: http://backend:3000
      SIKAFLOW_API_KEY: ${ADMIN_API_KEY}
      # WhatsApp channel
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      # Telegram channel
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      zeroclaw-db-init:
        condition: service_completed_successfully
    networks:
      - sikaflow_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data_staging:
  redis_data_staging:

networks:
  sikaflow_net:
    driver: bridge

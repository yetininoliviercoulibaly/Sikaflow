version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # 1. DATABASE (PostgreSQL)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    networks:
      - sikaflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 2. CACHE (Redis)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data_staging:/data
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 3. MIGRATION RUNNER (Job Init)
  # ---------------------------------------------------------------------------
  migration-runner:
    # HARDCODED IMAGE to avoid variable expansion issues
    image: ghcr.io/softilab/sikaflow-backend:develop
    command: sh -c "npx mikro-orm migration:up --config ./dist/mikro-orm.config.js && npx mikro-orm seeder:run --config ./dist/mikro-orm.config.js"
    environment:
      NODE_ENV: staging
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      MIKRO_ORM_MIGRATIONS_DISABLE_FOREIGN_KEYS: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 4. API (NestJS)
  # ---------------------------------------------------------------------------
  backend:
    # HARDCODED IMAGE to avoid variable expansion issues
    image: ghcr.io/softilab/sikaflow-backend:develop
    restart: always
    environment:
      NODE_ENV: staging
      PORT: 3000
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      SCANNER_URL: ${SCANNER_URL}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Keys
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      WHATSAPP_VERIFY_SIGNATURE: ${WHATSAPP_VERIFY_SIGNATURE}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      WAVE_API_KEY: ${WAVE_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-1.5-flash}
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      # Feature Flags
      BYPASS_SUBSCRIPTION_CHECK: ${BYPASS_SUBSCRIPTION_CHECK:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migration-runner:
        condition: service_completed_successfully
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 5. FRONTEND (Next.js) - Dashboard
  # ---------------------------------------------------------------------------
  frontend:
    # HARDCODED IMAGE
    image: ghcr.io/softilab/sikaflow-frontend:develop
    restart: always
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_API_URL: https://api-staging.sika-flow.com
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 6. SCANNER (Vite React PWA) - Ticket Validation
  # ---------------------------------------------------------------------------
  scanner:
    # HARDCODED IMAGE
    image: ghcr.io/softilab/sikaflow-scanner:develop
    restart: always
    environment:
      VITE_API_URL: https://api-staging.sika-flow.com
    networks:
      - sikaflow_net

  # ---------------------------------------------------------------------------
  # 7. CLOUDFLARE TUNNEL (Expose to Internet)
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - sikaflow_net

volumes:
  postgres_data_staging:
  redis_data_staging:

networks:
  sikaflow_net:
    driver: bridge
